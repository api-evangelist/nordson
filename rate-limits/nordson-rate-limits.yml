specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Nordson Corporation
providerId: nordson
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Dispensing
  - Testing
  - Industrial
  - Rate Limiting
description: Nordson does not publicly publish rate limits for its API surface. Limits are negotiated
  during customer onboarding and applied per API key. Sustained abuse is handled via account suspension
  rather than a documented per-second ceiling.
notes: Rate limit values are not publicly published. Update once Nordson publishes per-API ceilings via
  developer.nordson.com.
sources:
  - https://www.nordson.com/en
responseCodes:
  unauthorized: 401
  forbidden: 403
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per API key
    scope: api-key
    metric: varies
    limit: not numerically published; subject to fair use under the Nordson customer agreement
    applies:
      - Nordson Corporation API
policies:
  - name: Onboarding-issued credentials
    description: API keys are provisioned through the Nordson account team and scoped to the customer's
      account.
  - name: Backoff
    description: Implement exponential backoff with jitter on 429/503 responses; honor Retry-After when
      present.
  - name: Fair use
    description: Sustained traffic patterns that materially impact shared infrastructure may be subject
      to fair-use throttling regardless of negotiated tier.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
