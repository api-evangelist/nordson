specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Nordson Corporation
providerId: nordson
publisherName: Nordson Corporation
serviceCategory: Industrial Equipment / Manufacturing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Dispensing
  - Testing
  - Industrial
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Nordson: API access is bundled with the underlying industrial
  customer/partner relationship and is not invoiced separately. Cost dimensions are operational — integration
  build cost rather than per-call invoicing.'
notes: Nordson does not invoice API consumers separately. Update once Nordson publishes a public developer
  portal with explicit billing.
sources:
  - https://www.nordson.com/en
principles:
  - name: Visibility
    description: Nordson does not bill per-call. Track per-API-key request volumes internally for capacity
      planning across the consuming manufacturing/IT systems.
  - name: Allocation
    description: Allocate integration cost (engineering time, monitoring) to the consuming product line
      or business unit. Tag Nordson API keys per app or factory for attribution.
  - name: Optimization
    description: Cache equipment configuration and reference data; batch telemetry uploads where Nordson
      equipment supports it. Avoid sub-minute polling per device.
  - name: Accountability
    description: Designate an OT/IT owner for the Nordson API credential and integration health. Coordinate
      with the Nordson account team for credential rotation and SLA reviews.
billingModel:
  pricingCategory: Bundled with Customer Relationship
  billingFrequency: None (bundled)
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: None
focusColumns:
  ServiceName: Nordson Corporation API
  ServiceCategory: Industrial Equipment / Manufacturing
  ProviderName: Nordson Corporation
  PublisherName: Nordson Corporation
  InvoiceIssuerName: Nordson Corporation (equipment/service contracts; API not separately billed)
  PricingCategory: Bundled
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Operationally tracked API request count per key (not invoiced)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - api_key
      - endpoint
  - name: telemetry_uploads
    description: Equipment telemetry payloads uploaded
    unit: payload
    aggregation: sum
    dimensions:
      - device_id
apis:
  - name: Nordson Corporation API
    baseURL: https://api.nordson.com
    tags:
      - Dispensing
      - Testing
      - Industrial
    serviceName: Nordson Corporation API
    serviceCategory: Industrial Equipment
unitEconomics:
  - name: Integration cost per device
    metric: integration_engineering_cost / connected_devices
    target: declining over time via reuse
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
