description: Nordson Corporation is a Fortune 1000 industrial manufacturer (precision dispensing, testing,
  inspection). The Nordson Corporation API surface is internal/partner-facing rather than a public commercial
  developer platform; developer.nordson.com was not publicly reachable during reconciliation. There is
  no published commercial pricing for API access — usage is governed by the underlying customer/partner
  relationship.
notes: developer.nordson.com was not publicly reachable; Nordson does not publish a self-serve API price
  sheet. Treat this as a partner/credentialed-access program. Update once Nordson publishes a developer
  portal with public terms.
sources:
  - https://www.nordson.com/en
plans:
  - id: nordson-customer-program
    name: Nordson Customer / Partner API Program
    type: enterprise
    description: API access provisioned to existing Nordson industrial customers and approved partners.
      No separate per-call pricing; access is bundled with the customer relationship.
    entries:
      - label: API access (bundled)
        name: customer_api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://api.nordson.com
        unit: 1
        price: included with customer relationship
        userMultiplied: false
    elements:
      - name: Nordson Corporation API
      - name: Onboarding via Nordson account team
